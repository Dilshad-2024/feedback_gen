<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Form | RateWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-warning shadow">

    <div class="container-xxl px-3">

        <a class="navbar-brand fw-bold fs-2 text-dark" href="{% url 'dashboard' %}">
            RateWise
        </a>

        <div class="ms-auto">

            <a href="{% url 'logout' %}" class="btn btn-outline-dark fw-semibold px-4">
                Logout
            </a>

        </div>

    </div>

</nav>

<!-- Main Content -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h3 class="mb-0">
                        Create Feedback Form
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <!-- Form Title -->
                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Form Title
                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                placeholder="Enter form title"
                                required>

                        </div>

                        <hr>

                        <!-- Additional Details -->

                        <h5 class="mb-3">

                            Additional Details

                        </h5>

                        <p class="text-muted">
                            Email is required in the form by default. You can add more details to be collected from the user.

                            <br>

                            <strong>Examples:</strong>
                            Name, Roll Number, Room Number, Department, Hostel, Semester, Employee ID, Phone Number.

                        </p>

                        <div id="fields">

                            <div class="mb-3">

                                <input
                                    type="text"
                                    name="fields[]"
                                    class="form-control"
                                    placeholder="Example : Room Number">

                            </div>

                        </div>

                        <button
                            type="button"
                            class="btn btn-dark"
                            onclick="addField()">

                            + Add Detail

                        </button>

                        <hr>

                        <!-- Questions -->

                        <h5 class="mb-3">

                            Questions

                        </h5>

                        <div id="questions">

                            <div class="mb-3">

                                <input
                                    type="text"
                                    name="questions[]"
                                    class="form-control"
                                    placeholder="Enter Question"
                                    required>

                            </div>

                        </div>

                        <button
                            type="button"
                            class="btn btn-dark"
                            onclick="addQuestion()">

                            + Add Question

                        </button>

                        <hr class="my-4">

                        <button
                            type="submit"
                            class="btn btn-dark w-100">

                            Save Form

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function addQuestion(){

    const container =
        document.getElementById("questions");

    const wrapper =
        document.createElement("div");

    wrapper.className = "mb-3";

    wrapper.innerHTML = `
        <input
            type="text"
            name="questions[]"
            class="form-control"
            placeholder="Enter Question"
            required>
    `;

    container.appendChild(wrapper);

}


function addField(){

    const container =
        document.getElementById("fields");

    const wrapper =
        document.createElement("div");

    wrapper.className = "mb-3";

    wrapper.innerHTML = `
        <input
            type="text"
            name="fields[]"
            class="form-control"
            placeholder="Example : Roll Number">
    `;

    container.appendChild(wrapper);

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
