<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Created | RateWise</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
           RateWise
        </a>

        <div class="ms-auto">
            <a href="{% url 'logout' %}" class="btn btn-outline-light">
                Logout
            </a>
        </div>

    </div>
</nav>

<!-- Content -->
<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        Form Created Successfully 
                    </h3>
                </div>

                <div class="card-body">

                    <h5 class="mb-3">
                        Share this link with voters:
                    </h5>

                    <div class="input-group mb-4">

                        <input
                            type="text"
                            id="formLink"
                            class="form-control"
                            value="http://127.0.0.1:8000/feedback/form/{{ form.id }}/"
                            readonly
                        >

                        <button
                            class="btn btn-primary"
                            onclick="copyLink()"
                        >
                            Copy Link
                        </button>

                    </div>

                    <div class="alert alert-info">
                        Anyone with this link can submit feedback for this form.
                    </div>

                    <div class="d-flex gap-2">

                        <a href="{% url 'create_form' %}"
                           class="btn btn-outline-primary">
                            Create Another Form
                        </a>

                        <a href="{% url 'dashboard' %}"
                           class="btn btn-primary">
                            Back to Dashboard
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>
    function copyLink() {

        const link =
            document.getElementById("formLink");

        navigator.clipboard.writeText(
            link.value
        );

        alert("Link copied successfully!");
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
